on:
  workflow_dispatch:
    inputs:
      enviroment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - "Staging"
          - "Prodution"
      run_ui_tests:
          description: 'Run UI testing'
          required: true
          type: boolean
          default: false
      
jobs:
  bulid:
    runs-on: ubuntu-latest
    steps:
     - name: check out source code
       uses: actions/checkout@v7.0.0
       with:
         repository: ${{ github.repository }}
         ref: ${{ github.ref_name }}
     - name: List files in workspaces
       run: ls ${{ github.workspace }}
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: UI Testing
        if: ${{ inputs.run_ui_tests }}
        run: echo "Run UI testing tools in $ {{input.enviroment}}"






        
