name: Hello World

on:
  push:
   branches: [main]
   paths-ignore:
     - ".github/workflows/*"
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Run a one-line script
        run: echo "Hello GitHub Action!"
  second-job:
    runs-on: windows-latest
    needs: hello-job
    steps:
      - run: echo "this jo is running on ${{ runner.os }}"
