name: Hello World

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/*"

  pull_request:
    branches:
      - main

  repository_dispatch:
    types:
      - on-demand-test

jobs:
  echo-vars:
    runs-on: ubuntu-latest
    steps:
      - name: Echo GitHub variables
        run: |
          echo "This job triggered by ${{ github.event_name }}"
          echo "This repository is ${{ github.repository }}"
          echo "This branch is ${{ github.ref_name }}"

  hello-job:
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-line script
        run: echo "Hello GitHub Action!"

      - name: Retrieve client payload
        run: echo "Client send status = ${{ github.event.client_payload.status }}"

  second-job:
    runs-on: windows-latest
    needs: hello-job
    steps:
      - run: echo "This job is running on ${{ runner.os }}"
